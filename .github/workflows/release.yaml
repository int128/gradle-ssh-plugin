name: release

on:
  pull_request:
    paths:
      - .github/workflows/release.yaml
      - gradle/**
      - '**/*.gradle'
      - .sdkmanrc
  push:
    branches:
      - master
    paths:
      - .github/workflows/release.yaml
      - gradle/**
      - '**/*.gradle'
      - .sdkmanrc
    tags:
      - '*'

jobs:
  plugin:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version-file: .sdkmanrc
      - uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      - run: ./gradlew validatePlugins

      - run: echo "$GRADLE_PROPERTIES_PUBLISH" >> ~/.gradle/gradle.properties
        env:
          GRADLE_PROPERTIES_PUBLISH: ${{ secrets.GRADLE_PROPERTIES_PUBLISH }}
      - if: github.ref_type == 'tag'
        run: ./gradlew publishPlugins
        env:
          VERSION: ${{ github.ref_name }}

  maven:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version-file: .sdkmanrc
      - uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      - run: ./gradlew sign
        env:
          VERSION: ${{ github.ref_name }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}

      - if: github.ref_type == 'tag'
        run: ./gradlew publishToMavenCentral
        env:
          VERSION: ${{ github.ref_name }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

  cli:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version-file: .sdkmanrc
      - uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      - run: ./gradlew shadowJar
      - run: java -jar groovy-ssh/cli/build/libs/gssh.jar
      - run: sha256sum -b groovy-ssh/cli/build/libs/gssh.jar > groovy-ssh/cli/build/libs/gssh.jar.sha256
      - if: github.ref_type == 'tag'
        run: gh release create "$VERSION" --generate-notes --target "$VERSION" groovy-ssh/cli/build/libs/gssh.jar groovy-ssh/cli/build/libs/gssh.jar.sha256
        env:
          VERSION: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
