allprojects {
    afterEvaluate {
		tasks.withType(Test) {
			finalizedBy ':testReport'
			testReport.testResults.from(binaryResultsDirectory)
			reports.html.required = false
			reports.junitXml.outputLocation = file("${rootProject.buildDir}/test-results")
		}
	}
}

task testReport(type: TestReport) {
	description = 'Generates test report for all projects'
	destinationDirectory = file("$buildDir/reports")
}